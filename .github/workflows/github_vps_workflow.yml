name: LocalXpose Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LocalXpose
        run: |
          wget https://api.localxpose.io/api/v2/downloads/loclx-linux-amd64.deb
          sudo dpkg -i loclx-linux-amd64.deb

      - name: Login
        env:
          LOCALXPOSE_TOKEN: ${{ secrets.LOCALXPOSE_TOKEN }}
        run: |
          printf "%s\n" "$LOCALXPOSE_TOKEN" | loclx account login

      - name: Check Status
        run: |
          loclx account status

      - name: Tunnel Test
        run: |
          timeout 20s loclx tunnel tcp --to localhost:22 || true
