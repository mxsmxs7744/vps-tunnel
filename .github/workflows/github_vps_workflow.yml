name: LocalXpose Deep Check

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LocalXpose
        run: |
          wget https://api.localxpose.io/api/v2/downloads/loclx-linux-amd64.deb
          sudo dpkg -i loclx-linux-amd64.deb

      - name: Search Authentication Files
        run: |
          which loclx

          echo "===================="

          strings $(which loclx) | grep -i token | head -50 || true

          echo "===================="

          strings $(which loclx) | grep -i access | head -50 || true

          echo "===================="

          strings $(which loclx) | grep -i login | head -50 || true
