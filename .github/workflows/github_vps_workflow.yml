name: VPS Tunnel with Telebit

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh restart

      - name: Install Telebit
        run: |
          curl -s https://get.telebit.io/ | bash

      - name: Start Telebit Tunnel
        run: |
          telebit ssh 22 > tunnel.log 2>&1 &
          sleep 10
          echo "===== Tunnel URL ====="
          cat tunnel.log

      - name: Keep VPS Alive
        run: |
          echo "VPS running for 60 minutes..."
          sleep 3600
