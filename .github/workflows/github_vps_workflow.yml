name: LocalXpose Login Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LocalXpose
        run: |
          wget https://api.localxpose.io/api/v2/downloads/loclx-linux-amd64.deb
          sudo dpkg -i loclx-linux-amd64.deb

      - name: Login Test
        env:
          LOCALXPOSE_TOKEN: ${{ secrets.LOCALXPOSE_TOKEN }}
        run: |
          echo "$LOCALXPOSE_TOKEN" | loclx account login

      - name: Check Account Status
        run: |
          loclx account status
