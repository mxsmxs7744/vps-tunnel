name: Temporary VPS with SSH Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install SSH Server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo service ssh start
          sudo useradd -m -s /bin/bash vpsuser
          echo 'vpsuser:vpspassword' | sudo chpasswd
          sudo usermod -aG sudo vpsuser
          echo "vpsuser ALL=(ALL) NOPASSWD:ALL" | sudo tee -a /etc/sudoers
          
      - name: Install Additional Tools
        run: |
          sudo apt-get install -y curl wget python3 python3-pip
          pip3 install requests
          
      - name: Setup SSH Config
        run: |
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          
      - name: Get Container IP
        id: ip
        run: |
          IP=$(hostname -I | awk '{print $1}')
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Container IP: $IP"
          
      - name: Start SSH Tunnel via Serveo
        id: tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R vps-$(date +%s):22:0.0.0.0 serveo.net > /tmp/serveo.log 2>&1 &
          TUNNEL_PID=$!
          sleep 30
          TUNNEL_HOST=$(grep -o 'Forwarding TCP connection from [^ ]*' /tmp/serveo.log | head -1 | awk '{print $5}')
          echo "url=$TUNNEL_HOST" >> $GITHUB_OUTPUT
          echo "Tunnel Host: $TUNNEL_HOST"
          if [ -z "$TUNNEL_HOST" ]; then
            echo "Failed to get tunnel host"
            cat /tmp/serveo.log
            exit 1
          fi
          
      - name: Keep Alive
        run: |
          echo "VPS is running. SSH available via serveo.net."
          echo "Tunnel Host: ${{ steps.tunnel.outputs.url }}"
          echo "Username: vpsuser"
          echo "Password: vpspassword"
          echo "Duration: ${{ inputs.duration || 60 }} minutes"
          sleep $(( ${{ inputs.duration || 60 }} * 60 ))
