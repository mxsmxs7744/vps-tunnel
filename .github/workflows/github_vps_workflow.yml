name: VPS Tunnel with Pagekite

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl python3

          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh restart

      - name: Install Pagekite
        run: |
          curl -s https://pagekite.net/pk/pagekite.py > pagekite.py
          chmod +x pagekite.py

      - name: Start Pagekite Tunnel
        run: |
          python3 pagekite.py --clean --frontend=pagekite.net:22 22:fasl-vps.pagekite.me:22 > tunnel.log 2>&1 &
          sleep 10
          echo "===== Tunnel URL ====="
          echo "fasl-vps.pagekite.me:22"
          cat tunnel.log

      - name: Keep VPS Alive
        run: |
          echo "VPS running for 60 minutes..."
          sleep 3600
