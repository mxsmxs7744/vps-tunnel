name: VPS Tunnel with LocalXpose

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl wget

          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Install LocalXpose
        run: |
          wget https://api.localxpose.io/api/v2/downloads/loclx-linux-amd64.deb
          sudo dpkg -i loclx-linux-amd64.deb

      - name: Login to LocalXpose
        env:
          LOCALXPOSE_TOKEN: ${{ secrets.LOCALXPOSE_TOKEN }}
        run: |
          loclx account login --token $LOCALXPOSE_TOKEN

      - name: Create TCP Tunnel
        run: |
          nohup loclx tunnel tcp --to localhost:22 > tunnel.log 2>&1 &

          echo "انتظار إنشاء النفق..."
          sleep 20

          echo "===== محتوى السجل ====="
          cat tunnel.log

      - name: Keep VPS Alive
        run: |
          echo "VPS is running for 6 hours..."
          sleep 21600
