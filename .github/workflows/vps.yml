name: VPS Tunnel with Cloudflare

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

          # إنشاء المستخدم
          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          # تفعيل تسجيل الدخول بكلمة المرور
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          # إعادة تشغيل SSH
          sudo service ssh restart

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Tunnel
        run: |
          nohup cloudflared tunnel --url tcp://localhost:22 > tunnel.log 2>&1 &

          echo "انتظار إنشاء النفق..."
          sleep 30

          echo "===== محتوى السجل ====="
          cat tunnel.log

          echo "===== العمليات الجارية ====="
          ps aux | grep cloudflared

      - name: Keep VPS Alive
        run: |
          echo "VPS running for 60 minutes..."
          sleep 3600
