name: VPS Tunnel with Pinggy

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh restart

      - name: Start Pinggy Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 tcp@free.pinggy.io > tunnel.log 2>&1 &
          sleep 10
          echo "===== Tunnel URL ====="
          cat tunnel.log | grep -o 'https://[^ ]*\.pinggy\.io' || echo "لم يتم العثور على الرابط، تحقق من السجل الكامل:"
          cat tunnel.log

      - name: Keep VPS Alive
        run: |
          echo "VPS is running for 60 minutes..."
          sleep 3600
