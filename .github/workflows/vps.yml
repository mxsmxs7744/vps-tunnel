name: VPS Tunnel with ngrok

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl jq

          # إنشاء مستخدم جديد
          sudo useradd -m -s /bin/bash vpsuser || true
          echo "vpsuser:vpspassword" | sudo chpasswd

          # تفعيل تسجيل الدخول بكلمة المرور
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config

          sudo service ssh restart

      - name: Install ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/
          ngrok version

      - name: Verify Secret Exists
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          echo "Token length: ${#NGROK_AUTH_TOKEN}"

          if [ -z "$NGROK_AUTH_TOKEN" ]; then
            echo "❌ NGROK_AUTH_TOKEN is empty!"
            exit 1
          fi

      - name: Authenticate and Start Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

          nohup ngrok tcp 22 > ngrok.log 2>&1 &

          sleep 15

          cat ngrok.log || true

          NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')

          if [ "$NGROK_URL" = "null" ] || [ -z "$NGROK_URL" ]; then
            echo "❌ Failed to obtain ngrok tunnel URL"
            exit 1
          fi

          echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV

      - name: Show SSH Information
        run: |
          echo "===================================="
          echo "SSH Host: $NGROK_URL"
          echo "Username : vpsuser"
          echo "Password : vpspassword"
          echo "===================================="

      - name: Keep VPS Alive
        run: |
          echo "VPS will stay alive for 60 minutes..."
          sleep 3600
